<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGENIERÍA INFORMÁTICA</title>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; position: sticky; top: 0; background: white; z-index: 100; padding-top: 10px;}
        #timer { color: var(--error); font-size: 1.2rem; }

        #login-section { text-align: center; padding: 20px 0; }
        
        /* Bloque de Materias */
        .subject-block { background: #fdfdfd; border: 2px solid #e1e8ed; border-radius: 12px; padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .subject-title { color: var(--primary); font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid var(--secondary); text-align: left; display: flex; align-items: center; gap: 10px;}
        
        /* Grid de Temas */
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .topic-card { background: var(--secondary); color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .topic-card:hover { background: #2980b9; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .topic-all { background: var(--primary); }
        .topic-all:hover { background: #1a252f; }

        .btn-main { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 30px;}
        .btn-main:hover { background: #1a252f; }
        .btn-danger { background: var(--error); width: auto; margin-top: 10px; font-size: 0.9rem; padding: 8px 15px;}
        .btn-danger:hover { background: #c0392b; }

        /* Estilos de las preguntas */
        .question-block { background: #fff; border: 1px solid #e1e8ed; border-radius: 10px; padding: 25px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .question-header { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 8px; margin-bottom: 15px; font-size: 1.1rem; }
        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; }
        
        .options-container { display: grid; gap: 12px; margin-top: 20px; }
        .option-btn { 
            padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; 
            transition: all 0.2s; background: white; text-align: left; font-size: 1.05rem;
        }
        .option-btn:hover:not(:disabled) { background: #f8f9fa; border-color: var(--secondary); }
        
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        
        .explanation { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid var(--secondary); display: none; border-radius: 4px; line-height: 1.5; }

        /* --- Estilos para el Gráfico Donut --- */
        .gauge-container { display: flex; justify-content: center; margin: 30px 0; }
        .gauge-outer { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: conic-gradient(var(--success) 0%, var(--error) 0); 
            display: flex; align-items: center; justify-content: center; position: relative; 
        }
        .gauge-outer::after { 
            content: ''; width: 130px; height: 130px; border-radius: 50%; 
            background: white; position: absolute; 
        }
        .gauge-inner { z-index: 1; text-align: center; }
        #score-text { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1 style="color: var(--primary);">INGENIERÍA INFORMÁTICA</h1>
        <p>Selecciona el bloque que deseas practicar para comenzar directamente.</p>
        
        <button class="btn-main btn-danger" onclick="resetProgress()">🗑️ Borrar mi progreso</button>
        <button class="btn-main" style="background: #e67e22; margin-top: 10px;" onclick="startFailedQuestionsTest()">
            ❌ Repasar mis fallos (<span id="failed-count">0</span>)
        </button>

        <div id="subjects-container" style="margin-top: 30px;"></div>
    </div>

    <div id="test-section" style="display:none;">
        <div class="header-info">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button onclick="goBackToMenu()" style="padding: 6px 12px; border: none; border-radius: 6px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer;">🔙 Volver</button>
                <div> 📚  <span id="display-topic"></span></div>
            </div>
            <div id="timer"> ⏱️  00:00</div>
        </div>

        <div id="questions-list"></div>
        
        <button id="finish-btn" class="btn-main" onclick="finishTest()">Finalizar Test ➔</button>
    </div>

    <div id="results-section" style="text-align: center; display: none; padding: 40px 0;">
        <h2 style="color: var(--primary);">¡Test Finalizado! 🎉</h2>
        
        <div class="gauge-container">
            <div class="gauge-outer" id="gauge-chart">
                <div class="gauge-inner">
                    <span id="score-text">0/0</span>
                </div>
            </div>
        </div>

        <p id="results-detail-text" style="font-size: 1.2rem; margin-bottom: 30px;"></p>
        <button class="btn-main" onclick="goBackToMenu()">  ↻  Volver al Menú Principal</button>
    </div>
</div>

                    btnAll.className = 'topic-card';
                    btnAll.style.fontSize = '1rem';
                    btnAll.style.padding = '10px';
                    btnAll.style.background = 'var(--primary)';
                    
                    const allId = `${subject}-${category}-Todos`;
                    btnAll.setAttribute('data-testid', allId);
                    
                    if (completedTests.includes(allId)) {
                        btnAll.innerText = `Todo el bloque ✅ `;
                        btnAll.style.background = '#27ae60';
                    } else {
                        btnAll.innerText = `Todo el bloque`;
                    }
                    
                    btnAll.onclick = () => startTest(subject, category, 'Todos');
                    btnAll.oncontextmenu = (e) => { e.preventDefault(); uncheckTest(allId); };
                    subGrid.appendChild(btnAll);
                    
                    wrapper.appendChild(btnCat);
                    wrapper.appendChild(subGrid);
                    grid.appendChild(wrapper);
                }
            });
            
            const btnSubjectAll = document.createElement('button');
            btnSubjectAll.className = 'topic-card topic-all';
            
            const subjAllId = `${subject}-Global-Todos`;
            btnSubjectAll.setAttribute('data-testid', subjAllId);
            
            if (completedTests.includes(subjAllId)) {
                btnSubjectAll.innerText = `Toda la materia ✅ `;
                btnSubjectAll.style.background = '#27ae60';
            } else {
                btnSubjectAll.innerText = `Toda la materia`;
            }
            
            btnSubjectAll.onclick = () => startTest(subject, 'Global', 'Todos');
            btnSubjectAll.oncontextmenu = (e) => { e.preventDefault(); uncheckTest(subjAllId); };
            grid.appendChild(btnSubjectAll);
            
            subjectDiv.appendChild(grid);
            container.appendChild(subjectDiv);
        });
        
        // Mostrar número de preguntas falladas al cargar el menú
        updateFailedCount();
    };

    function uncheckTest(testId) {
        if(confirm(`¿Quieres quitar el check de completado de este tema?`)) {
            let completed = JSON.parse(localStorage.getItem('completed_tests_v5') || '[]');
            completed = completed.filter(id => id !== testId);
            localStorage.setItem('completed_tests_v5', JSON.stringify(completed));
            window.onload(); 
        }
    }

    // ==========================================
    // CONTROL DEL BOTÓN "ATRÁS" DEL MÓVIL/NAVEGADOR
    // ==========================================
    history.replaceState({page: 'menu'}, "Menú", "");

    window.addEventListener('popstate', function(event) {
        if (event.state && event.state.page === 'menu') {
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('test-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
            updateCheckmarks();
            updateFailedCount();
            window.scrollTo(0,0);
        }
    });

    // ==========================================
    // FUNCIONES DE LÓGICA DEL TEST
    // ==========================================
    function startTest(subject, category, topic) {
        selectedSubject = subject;
        selectedCategory = category;
        selectedTopicName = topic;
        
        if (category === 'Global') {
            document.getElementById('display-topic').innerText = `${subject} (Test Global)`;
            currentQuestions = misPreguntas.filter(q => q.m === subject);
        } else if (topic === 'Todos') {
            document.getElementById('display-topic').innerText = `${subject} - ${category}`;
            currentQuestions = misPreguntas.filter(q => q.m === subject && q.t === category);
        } else {
            let isSimple = misPreguntas.filter(q => q.m === subject && q.t === category).map(q => q.u).length === 1;
            document.getElementById('display-topic').innerText = isSimple ? `${subject} - ${category}` : `${subject} - ${topic}`;
            currentQuestions = misPreguntas.filter(q => q.m === subject && q.t === category && q.u === topic);
        }
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('test-section').style.display = 'block';
        
        // Empujamos el estado al historial para que el botón "Atrás" físico del móvil funcione
        history.pushState({page: 'test'}, "Test", "");
        
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
        
        shuffleArray(currentQuestions);
        renderAllQuestions();
        
        window.scrollTo(0,0);
    }

    function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        document.getElementById('timer').innerText = ` ⏱️  ${Math.floor(diff / 60).toString().padStart(2, '0')}:${(diff % 60).toString().padStart(2, '0')}`;
    }

    function renderAllQuestions() {
        const container = document.getElementById('questions-list');
        container.innerHTML = '';
        answeredStatus = {};
        
        currentQuestions.forEach((q, index) => {
            let options = [...q.r];
            shuffleArray(options);
            
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `${index + 1}/${currentQuestions.length}. ${q.p}`; // USANDO innerHTML AQUÍ
            qBlock.appendChild(qText);
            
            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';
            optionsContainer.id = `options-${index}`;
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt; // USANDO innerHTML AQUÍ PARA LAS RESPUESTAS MATEMÁTICAS
                // Pasamos q.p para guardar la pregunta si la falla
                btn.onclick = function() { checkAnswer(this, index, opt, q.c, q.e, q.p); };
                optionsContainer.appendChild(btn);
            });
            
            qBlock.appendChild(optionsContainer);
            
            const expl = document.createElement('div');
            expl.id = `explanation-${index}`;
            expl.className = 'explanation';
            qBlock.appendChild(expl);
            
            container.appendChild(qBlock);
        });

        // ==========================================
        // AQUÍ ESTÁ EL AVISO PARA QUE MATHJAX DIBUJE LAS FÓRMULAS
        // ==========================================
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function checkAnswer(btn, index, selected, correct, info, questionText) {
        if (answeredStatus[index] !== undefined) return;
        const optionsContainer = document.getElementById(`options-${index}`);
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        
        let failedQuestions = JSON.parse(localStorage.getItem('preguntas_falladas') || '[]');
        
        if (selected === correct) {
            btn.classList.add('correct');
            answeredStatus[index] = true;
            
            // Si la acierta y estaba en los fallos, la borramos
            if (failedQuestions.includes(questionText)) {
                failedQuestions = failedQuestions.filter(q => q !== questionText);
                localStorage.setItem('preguntas_falladas', JSON.stringify(failedQuestions));
                updateFailedCount();
            }
        } else {
            btn.classList.add('wrong');
            answeredStatus[index] = false;
            buttons.forEach(b => {
                if(b.innerHTML === correct) b.classList.add('correct'); // Aseguramos usar innerHTML para la comprobación correcta si hay formato
            });
            
            // Si la falla y NO estaba ya en la lista, la guardamos
            if (!failedQuestions.includes(questionText)) {
                failedQuestions.push(questionText);
                localStorage.setItem('preguntas_falladas', JSON.stringify(failedQuestions));
                updateFailedCount();
            }
        }
        
        if (info && info.trim() !== "") {
            const eb = document.getElementById(`explanation-${index}`);
            eb.innerHTML = `<strong> 💡 Aclaración:</strong> ${info}`;
            eb.style.display = 'block';
        }
    }

    function finishTest() {
        const totalQuestions = currentQuestions.length;
        const totalAnswered = Object.keys(answeredStatus).length;
        
        if (totalAnswered < totalQuestions) {
            if (!confirm(`Has respondido ${totalAnswered} de ${totalQuestions} preguntas. ¿Seguro que quieres finalizar el test?`)) {
                return;
            }
        }
        
        clearInterval(timerInterval);
        document.getElementById('test-section').style.display = 'none';
        
        let correctCount = 0;
        let incorrectCount = 0;
        Object.values(answeredStatus).forEach(v => {
            if (v) correctCount++;
            else incorrectCount++;
        });
        
        let percentage = (correctCount / totalQuestions) * 100;
        let successColor = getComputedStyle(document.documentElement).getPropertyValue('--success').trim();
        let errorColor = getComputedStyle(document.documentElement).getPropertyValue('--error').trim();
        
        document.getElementById('gauge-chart').style.background = `conic-gradient(${successColor} ${percentage}%, ${errorColor} 0)`;
        document.getElementById('score-text').innerText = `${correctCount}/${totalQuestions}`;
        
        document.getElementById('results-detail-text').innerHTML = `Has acertado <strong><span style="color: var(--success);">${correctCount}</span></strong> y fallado <strong><span style="color: var(--error);">${incorrectCount}</span></strong> de un total de ${totalQuestions} preguntas.`;
        
        document.getElementById('results-section').style.display = 'block';
        
        let completed = JSON.parse(localStorage.getItem('completed_tests_v5') || '[]');
        let currentTestId = `${selectedSubject}-${selectedCategory}-${selectedTopicName}`;
        
        // No marcamos check verde si es el test de Fallos
        if (selectedCategory !== "Fallos" && !completed.includes(currentTestId)) {
            completed.push(currentTestId);
            localStorage.setItem('completed_tests_v5', JSON.stringify(completed));
        }
        
        window.scrollTo(0,0);
    }

    function resetProgress() {
        if(confirm("¿Seguro que quieres borrar todo tu progreso? Esto quitará todos los ✅ y vaciará tu lista de fallos.")) {
            localStorage.removeItem('completed_tests_v5');
            localStorage.removeItem('preguntas_falladas');
            window.onload(); 
        }
    }

    function shuffleArray(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
    }

    function updateCheckmarks() {
        const completedTests = JSON.parse(localStorage.getItem('completed_tests_v5') || '[]');
        document.querySelectorAll('.topic-card').forEach(btn => {
            const testId = btn.getAttribute('data-testid');
            if (testId && completedTests.includes(testId) && !btn.innerText.includes('✅')) {
                btn.innerText = btn.innerText + ' ✅ ';
                btn.style.background = '#27ae60';
            }
        });
    }

    // ==========================================
    // FUNCIÓN PARA EL BOTÓN "VOLVER"
    // ==========================================
    function goBackToMenu() {
        // Simula presionar el botón de atrás del móvil o navegador
        history.back();
    }

    // ==========================================
    // NUEVAS FUNCIONES: REPASAR FALLOS
    // ==========================================
    function startFailedQuestionsTest() {
        let failedQuestions = JSON.parse(localStorage.getItem('preguntas_falladas') || '[]');
        
        if (failedQuestions.length === 0) {
            alert("¡Enhorabuena! 🎉 No tienes ninguna pregunta fallada pendiente de repasar.");
            return;
        }

        selectedSubject = "Repaso General";
        selectedCategory = "Fallos";
        selectedTopicName = "Todos";
        
        document.getElementById('display-topic').innerText = `Repaso de Preguntas Falladas`;
        
        // Filtramos para sacar las preguntas que están guardadas como fallidas
        currentQuestions = misPreguntas.filter(q => failedQuestions.includes(q.p));
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('test-section').style.display = 'block';
        
        history.pushState({page: 'test'}, "Test", "");
        
        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
        
        shuffleArray(currentQuestions);
        renderAllQuestions();
        
        window.scrollTo(0,0);
    }

    function updateFailedCount() {
        let failedQuestions = JSON.parse(localStorage.getItem('preguntas_falladas') || '[]');
        let countSpan = document.getElementById('failed-count');
        if(countSpan) countSpan.innerText = failedQuestions.length;
    }
</script>
</body>
</html>
